services:
  - type: web
    name: medical-classifier-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false  # Will require input via Render UI
      - key: SUPABASE_KEY
        sync: false  # Will require input via Render UI
      - key: PYTHONPATH
        value: src
